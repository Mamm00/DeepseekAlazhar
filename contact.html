<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact – Al Azhar Tex</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo"><img src="images/logo.png" alt="Al Azhar Tex"></a>
    <button class="hamburger"><span></span><span></span><span></span></button>
    <nav><ul class="nav-list">
      <li><a href="index.html">Home</a></li><li><a href="products.html">Products</a></li><li><a href="gallery.html">Gallery</a></li><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li>
    </ul></nav>
  </div>
</header>

<main>
  <section class="section container reveal">
    <h2 class="section-title">Get in Touch</h2>
    <div class="contact-info-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:2rem; margin-bottom:3rem;">
      <div><strong>Address</strong><br><span data-text="contactAddress">Zagazig, Egypt</span></div>
      <div><strong>Phone</strong><br><span data-text="phone">+20 100 360 0949</span></div>
      <div><strong>Hours</strong><br><span data-text="workHours">Daily 11–7, Closed Fri</span></div>
    </div>

    <form action="https://formspree.io/f/yourFormID" method="POST" class="contact-form">
      <div class="form-group"><input type="text" name="name" placeholder="Your Name" required></div>
      <div class="form-group"><input type="email" name="email" placeholder="Your Email" required></div>
      <div class="form-group"><input type="tel" name="phone" placeholder="Phone"></div>
      <div class="form-group">
        <select name="interest">
          <option>Women's Fabrics</option><option>Men's Fabrics</option><option>Trending</option><option>Other</option>
        </select>
      </div>
      <div class="form-group"><textarea name="message" rows="5" placeholder="Your message"></textarea></div>
      <!-- Honeypot -->
      <input type="text" name="_gotcha" class="honeypot" tabindex="-1" autocomplete="off">
      <button type="submit" class="btn">Send Message</button>
    </form>

    <div style="margin-top:3rem;">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d27637.663545544!2d31.5020!3d30.5877!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14f7e1a4b4b4b4b4b%3A0x1234567890abcdef!2sZagazig%2C%20Egypt!5e0!3m2!1sen!2seg!4v1610000000000" width="100%" height="350" style="border:0; border-radius:12px;" allowfullscreen="" loading="lazy"></iframe>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-grid">
    <div class="footer-col"><h4>Al Azhar Tex</h4><p data-text="footerText">© Al Azhar Tex</p></div>
    <div class="footer-col"><h4>Contact</h4><p data-text="phone">+20 100 360 0949</p></div>
    <div class="footer-col"><h4>Hours</h4><p data-text="workHours">Daily 11–7 | Closed Fri</p></div>
    <div class="footer-col"><a href="admin.html" style="font-size:0.7rem; opacity:0.5;">Admin</a></div>
  </div>
</footer>
